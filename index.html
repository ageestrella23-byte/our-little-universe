<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Universe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- INTRO SCREEN -->
    <section id="intro" class="intro-screen">
        <div class="galaxy-bg"></div>
        <div class="nebula-layer nebula-one"></div>
        <div class="nebula-layer nebula-two"></div>
        <div class="space-dust"></div>

        <div id="backgroundStars" class="background-stars"></div>
        <div id="sparkles" class="sparkles"></div>
        <div id="shootingStarsContainer" class="shooting-stars"></div>

        <div class="glowing-moon"></div>

        <div class="heart-constellation">
            <svg viewBox="0 0 220 210" class="heart-svg" aria-hidden="true">
                <path
                    class="heart-line"
                    d="M110 185
                       C 85 160, 35 130, 35 82
                       C 35 55, 56 38, 82 38
                       C 98 38, 107 48, 110 60
                       C 113 48, 122 38, 138 38
                       C 164 38, 185 55, 185 82
                       C 185 130, 135 160, 110 185 Z" />

                <circle class="heart-dot" cx="110" cy="185" r="5" />
                <circle class="heart-dot" cx="82" cy="150" r="4" />
                <circle class="heart-dot" cx="55" cy="122" r="4" />
                <circle class="heart-dot" cx="36" cy="88" r="4" />
                <circle class="heart-dot" cx="45" cy="58" r="4" />
                <circle class="heart-dot" cx="75" cy="38" r="4" />
                <circle class="heart-dot" cx="100" cy="48" r="4" />
                <circle class="heart-dot" cx="120" cy="48" r="4" />
                <circle class="heart-dot" cx="145" cy="38" r="4" />
                <circle class="heart-dot" cx="175" cy="58" r="4" />
                <circle class="heart-dot" cx="184" cy="88" r="4" />
                <circle class="heart-dot" cx="165" cy="122" r="4" />
                <circle class="heart-dot" cx="138" cy="150" r="4" />
            </svg>
        </div>

        <div class="intro-content">
            <h1>Our Little Universe</h1>
            <p>In every universe, I would still choose you.</p>
            <button id="enterBtn">Enter Our Universe</button>
        </div>

        <audio id="backgroundMusic" loop>
            <source src="music/background-song.mp3" type="audio/mpeg">
        </audio>
    </section>

    <!-- MAIN UNIVERSE -->
    <section id="universe" class="universe hidden">
        <div class="moon" id="moon">🌙</div>

        <h2>Every star holds a piece of my heart for you</h2>
        <p class="instruction">Click a star to discover a memory.</p>

        <div class="memory-star star1" data-index="0">✦</div>
        <div class="memory-star star2" data-index="1">✦</div>
        <div class="memory-star star3" data-index="2">✦</div>
        <div class="memory-star star4" data-index="3">✦</div>
        <div class="memory-star star5" data-index="4">✦</div>
        <div class="memory-star star6" data-index="5">✦</div>
        <div class="memory-star star7" data-index="6">✦</div>
        <div class="memory-star star8" data-index="7">✦</div>
        <div class="memory-star star9" data-index="8">✦</div>
        <div class="memory-star star10" data-index="9">✦</div>
        <div class="memory-star star11" data-index="10">✦</div>
        <div class="memory-star star12" data-index="11">✦</div>
    </section>

    <!-- POPUP -->
    <div id="popup" class="popup hidden">
        <div class="popup-card">
            <span id="closePopup" class="close">&times;</span>

            <h2 id="memoryTitle"></h2>
            <p id="memoryDate"></p>
            <div id="memoryMessage"></div>

            <div id="videoBox" class="video-box hidden">
                <video id="memoryVideo" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div id="photoBox"></div>

            <div id="dedicationBox" class="dedication-box hidden">
                <h3>A Dedication For You</h3>
                <p id="dedicationText"></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
